name: Daily Behavior Backtest

on:
  schedule:
    # 16:00 UTC = 00:00 GMT+8
    - cron: "0 16 * * *"
  # Allow manual trigger from the GitHub Actions UI
  workflow_dispatch:
    inputs:
      start_date:
        description: "Override start date (YYYY-MM-DD). Defaults to yesterday GMT+8."
        required: false
      end_date:
        description: "Override end date (YYYY-MM-DD). Defaults to yesterday GMT+8."
        required: false

jobs:
  backtest:
    name: Run S2 Behavior Backtest
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --omit=dev

      # Write the Google service account JSON from the secret into a temp file.
      # GOOGLE_SERVICE_ACCOUNT_KEY env var points to this path (matches BehaviorSheetsReporter.fromEnv()).
      - name: Write Google service account key file
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > /tmp/google-sa-key.json

      # Compute "yesterday in GMT+8" as the backtest window unless overridden.
      # At 00:00 GMT+8 the previous calendar day has just finished — that is the day to process.
      - name: Compute backtest date range
        id: dates
        run: |
          if [ -n "${{ github.event.inputs.start_date }}" ]; then
            echo "start=${{ github.event.inputs.start_date }}" >> $GITHUB_OUTPUT
            echo "end=${{ github.event.inputs.end_date }}" >> $GITHUB_OUTPUT
          else
            # "yesterday" in GMT+8: UTC now is 16:00, so UTC date == GMT+8 yesterday
            YESTERDAY=$(TZ="Asia/Kuala_Lumpur" date -d "yesterday" +%Y-%m-%d)
            echo "start=${YESTERDAY}" >> $GITHUB_OUTPUT
            echo "end=${YESTERDAY}" >> $GITHUB_OUTPUT
          fi

      - name: Run behavior backtest
        env:
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_SERVICE_ACCOUNT_KEY: /tmp/google-sa-key.json
          BEHAVIOR_BACKTEST_START: ${{ steps.dates.outputs.start }}
          BEHAVIOR_BACKTEST_END: ${{ steps.dates.outputs.end }}
          BEHAVIOR_PAIR: "BTC-USD"
          BEHAVIOR_SHEET_TAB: ${{ vars.BEHAVIOR_SHEET_TAB }}
          BEHAVIOR_DASHBOARD_TAB: ${{ vars.BEHAVIOR_DASHBOARD_TAB }}
        run: npm run behavior:backtest

      - name: Clean up service account key
        if: always()
        run: rm -f /tmp/google-sa-key.json
