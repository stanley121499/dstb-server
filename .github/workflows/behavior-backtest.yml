name: Daily Behavior Backtest

on:
  schedule:
    # 16:00 UTC = 00:00 GMT+8
    - cron: "0 16 * * *"
  # Allow manual trigger from the GitHub Actions UI
  workflow_dispatch:
    inputs:
      start_date:
        description: "Override start date (YYYY-MM-DD). Defaults to BEHAVIOR_BACKTEST_START env default (2024-01-01)."
        required: false
      end_date:
        description: "Override end date (YYYY-MM-DD). Defaults to today UTC."
        required: false

jobs:
  backtest:
    name: Run S2 Behavior Backtest
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --omit=dev

      # Write the Google service account JSON from the secret into a temp file.
      # GOOGLE_SERVICE_ACCOUNT_KEY env var points to this path (matches BehaviorSheetsReporter.fromEnv()).
      - name: Write Google service account key file
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > /tmp/google-sa-key.json

      - name: Run behavior backtest
        env:
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_SERVICE_ACCOUNT_KEY: /tmp/google-sa-key.json
          # bulkWrite clears and rewrites the full sheet on every run.
          # We always run the full history so the sheet stays complete.
          # Manual overrides via workflow_dispatch inputs are passed through when set.
          BEHAVIOR_BACKTEST_START: ${{ github.event.inputs.start_date || '2024-01-01' }}
          BEHAVIOR_BACKTEST_END: ${{ github.event.inputs.end_date || '' }}
          BEHAVIOR_PAIR: "BTC-USD"
          BEHAVIOR_SHEET_TAB: ${{ vars.BEHAVIOR_SHEET_TAB }}
          BEHAVIOR_DASHBOARD_TAB: ${{ vars.BEHAVIOR_DASHBOARD_TAB }}
        run: npm run behavior:backtest

      - name: Clean up service account key
        if: always()
        run: rm -f /tmp/google-sa-key.json
