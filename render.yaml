# Render Blueprint: Background Worker (Docker). See DEPLOY-RENDER.md for setup.
# https://render.com/docs/blueprint-spec
services:
  - type: worker
    name: dstb-server
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: NODE_ENV
        value: production
      # Add secrets in the dashboard or here with sync: false (prompt on first deploy):
      # - key: BITUNIX_API_KEY
      #   sync: false
      # - key: BITUNIX_API_SECRET
      #   sync: false
      # - key: TELEGRAM_BOT_TOKEN
      #   sync: false
      # - key: TELEGRAM_CHAT_ID
      #   sync: false
      # - key: GOOGLE_SHEETS_ID
      #   sync: false
      # - key: GOOGLE_SERVICE_ACCOUNT_KEY
      #   sync: false
